<script>

const APP = {}
APP._events = [];
APP.on = function(action,event){ APP._events.push({action,event}) }
window.addEventListener('message', (event)=>{
  if (!event.origin.endsWith("topluyo.com")) return;
  let data = (event.data)
  if(data.action){
    APP._events.filter(e=> e.action==data.action ).map(e=>e.event(data.parameters))
  }
})
APP.up = function(action,parameters){
  let data = {action,parameters,url:location.href}
  window.parent.postMessage(data,"https://topluyo.com")
  window.parent.postMessage(data,"https://alfa.topluyo.com")
  window.parent.postMessage(data,"https://app.topluyo.com")
}



function xss(text) {
  if (typeof text !== "string") return text;
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function htmlRevert(str) {
  return str
    .replace(/&amp;/g, "&")
    .replace(/&lt;/g, "<")
    .replace(/&gt;/g, ">")
    .replace(/&quot;/g, '"')
    .replace(/&#39;/g, "'");
}



let posts = {}
function CreateOrChange(post){
  posts[post.id] = post
  if($('[post-id="'+post.id+'"]')){
    let postElement = $('[post-id="'+post.id+'"]')
    $("[change-icon]",postElement).setAttribute("documenter-icon",JSON.parse(htmlRevert(post.text)).icon)
    $("[change-icon]",postElement).innerHTML = documenter.icons[JSON.parse(htmlRevert(post.text)).icon]
    $("[space]",postElement).innerHTML = documenter.markdown(xss(JSON.parse(htmlRevert(post.text)).text))
  }else{
    $("content").innerHTML += `<item parent-hover post-id="${post.id}" style="--order:${post.id}" flex-x center gap>
        <div down over padding change-icon documenter-icon="${JSON.parse(htmlRevert(post.text)).icon}"></div>
        <div space padding>${documenter.markdown(xss(JSON.parse(htmlRevert(post.text)).text))}</div>
        <div down over hover-show padding documenter-icon="edit"></div>
        <div down over hover-show padding documenter-icon="trash" onclick="Delete(${post.id});Button.loading(this);"></div>
      </item>`
  }
}


APP.up("<post/list")

APP.on(">post/list+", function(response){
  let post = response.data
  CreateOrChange(post)
})

APP.on(">post/list", function(response){
  let posts = response.data
  posts.map(post=>CreateOrChange(post))
})

APP.on(">post/list-",function(response){
  let id = response.data
  $("[post-id='"+id+"']")?.remove()
})

</script>

<content spellcheck="false"></content>
<div flex-x center gap>
  <div change-icon over down padding documenter-icon="waiting"></div>
  <input space id="text" placeholder="..............." spellcheck="false" onkeydown="if(event.keyCode==13 && event.shiftKey==false) Create();">
  <div over down padding documenter-icon="plus" onclick="Create()"></div>
</div>

<script>
  documenter.on("click","[change-icon]",function(){
    let val = this.getAttribute("documenter-icon");
    let order = ["waiting","success","update","error"]
    let index = order.indexOf(val)
    let newIcon =  order[ (index+1)%order.length ]
    this.innerHTML = documenter.icons[ newIcon ] 
    this.setAttribute("documenter-icon",newIcon)
  })

  function Create(){
    let icon = $("[change-icon]").getAttribute("documenter-icon")
    let text = $("#text").value
    APP.up("<post/add",{text:JSON.stringify({icon,text})})
    $("#text").value=""
  }

  function Delete(id){
    APP.up("<post/del",{post_id:id})
  }

  documenter.on("click",'[documenter-icon="edit"]',function(e){
    if($("[contenteditable]")){
      $("[contenteditable]").innerHTML = documenter.markdown($("[contenteditable]").innerHTML)
      return $("[contenteditable]").removeAttribute("contenteditable")
    }

    this.prev.setAttribute("contenteditable","true")
    this.prev.innerHTML = xss(JSON.parse( htmlRevert(posts[parseInt(this.parent.getAttribute('post-id'))].text) ).text)
    this.prev.focus()
    this.prev.onkeydown = (event)=>{
      if(event.keyCode==13 && event.shiftKey==false){
        APP.up("<post/set",{post_id:parseInt(this.parent.getAttribute('post-id')),text:JSON.stringify({text:this.prev.innerText,icon:this.prev.prev.getAttribute('documenter-icon')})})
        event.preventDefault()
        this.prev.removeAttribute("contenteditable")
      }
    }
  })

  documenter.on("click",'[post-id] [change-icon][documenter-icon]',function(){
    let post_id = parseInt(this.parent.getAttribute('post-id'))
    let text    = JSON.parse( htmlRevert( posts[post_id].text ) ).text
    APP.up("<post/set",{post_id:post_id,text:JSON.stringify({text:text,icon:this.getAttribute('documenter-icon')})})
  })

  documenter.on("click","a[href]",function(e){
    window.open(this.href,"_blank")
    e.preventDefault()
  })
</script>















<script>
  const Button = {}
  Button.loader = function(el,action){
    Button.loading(el)
    action.then(e=>{
      Button.success(el)
    })
  }
  Button.loading = function(button){
    if(button._innerHTML==null) button._innerHTML = button.innerHTML
    button.classList.add("loading")
  }
  Button.success = function(el){
    if(!el._innerHTML) el._innerHTML = el.innerHTML;
    el.style.width = el.offsetWidth + "px";
    el.style.textAlign = "center"
    el.innerHTML = "✔"
    el.classList.remove("loading")
    setTimeout(e=>{
      el.innerHTML = el._innerHTML
      el.style.width = null;
    },1000)
  }
</script>
<style>
  button.loading, .button.loading,[button].loading,.loading{
    color: transparent!important;
    position: relative;
  }

  .loading > *{
    visibilty:hidden;
  }

  button.loading:after, .button.loading:after, [button].loading:after,.loading:after{
    content:"";
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 1em;
    height: 1em;
    border-radius: 100%;
    border:2px solid var(--front);
    clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0% 100%);
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to {
      transform: translate(-50%, -50%) rotate(360deg);
    }
  }
</style>
